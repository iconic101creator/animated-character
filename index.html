<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated 2D Character</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    canvas {
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 8px 20px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.18); }
    #state-label {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

  <canvas id="c" width="560" height="300"></canvas>
  <div class="controls">
    <button onclick="setState('walk')">🚶 Walk</button>
    <button onclick="setState('jump')">🦘 Jump</button>
    <button onclick="setState('idle')">😌 Idle</button>
    <button onclick="setState('wave')">👋 Wave</button>
  </div>
  <p id="state-label">State: idle</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const GROUND = H - 50;

    let state = 'idle';
    let t = 0;
    let charX = W / 2;
    let charY = GROUND;
    let jumpVY = 0;
    let isJumping = false;
    let poked = false;

    function setState(s) {
      state = s;
      document.getElementById('state-label').textContent = 'State: ' + s;
      if (s === 'jump' && !isJumping) {
        isJumping = true;
        jumpVY = -14;
      }
      if (s !== 'walk') charX = W / 2;
    }

    function drawCloud(x, y, w, h) {
      ctx.beginPath();
      ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.28, y - h * 0.2, w * 0.38, h * 0.45, 0, 0, Math.PI * 2);
      ctx.ellipse(x - w * 0.28, y - h * 0.15, w * 0.32, h * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGround() {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#87CEEB');
      sky.addColorStop(1, '#d0f0ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#5dbb63';
      ctx.fillRect(0, GROUND + 40, W, H - GROUND - 40);
      ctx.fillStyle = '#4aaa56';
      ctx.fillRect(0, GROUND + 38, W, 6);

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      drawCloud(80 + Math.sin(t * 0.002) * 5, 50, 60, 22);
      drawCloud(380 + Math.sin(t * 0.0015 + 1) * 4, 70, 80, 26);
      drawCloud(230 + Math.sin(t * 0.0018 + 2) * 3, 38, 50, 18);
    }

    function drawCharacter(x, y) {
      ctx.save();
      ctx.translate(x, y);

      let walkCycle = 0, hipBob = 0, lean = 0, headBob = 0;
      let lLegAngle = 0, rLegAngle = 0;
      let lArmAngle = 0, rArmAngle = 0;

      if (state === 'walk') {
        walkCycle = Math.sin(t * 0.12) * 0.55;
        hipBob = Math.abs(Math.sin(t * 0.12)) * 4;
        lean = Math.sin(t * 0.12) * 0.04;
        headBob = Math.abs(Math.sin(t * 0.12)) * 2;
        lLegAngle = walkCycle;
        rLegAngle = -walkCycle;
        lArmAngle = -walkCycle * 0.7;
        rArmAngle = walkCycle * 0.7;
      } else if (state === 'jump') {
        lLegAngle = -0.35; rLegAngle = 0.35;
        lArmAngle = -0.8; rArmAngle = -0.8;
        lean = -0.05;
      } else if (state === 'idle') {
        hipBob = Math.sin(t * 0.03) * 1.5;
        headBob = Math.sin(t * 0.025) * 1;
        lArmAngle = Math.sin(t * 0.025) * 0.06;
        rArmAngle = -Math.sin(t * 0.025) * 0.06;
      } else if (state === 'wave') {
        hipBob = Math.sin(t * 0.03) * 1.2;
        rArmAngle = -1.1 + Math.sin(t * 0.15) * 0.35;
        lArmAngle = 0.1;
      }

      const bodyY = -hipBob;

      
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(0, 2, 22, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.rotate(lean);

      
      const legLen = 28, legW = 9;
      ctx.save();
      ctx.translate(-9, bodyY - 8);
      ctx.rotate(lLegAngle);
      ctx.fillStyle = '#3B4EA6';
      ctx.beginPath(); ctx.roundRect(-legW/2, 0, legW, legLen, 4); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.ellipse(0, legLen + 4, 8, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(9, bodyY - 8);
      ctx.rotate(rLegAngle);
      ctx.fillStyle = '#3B4EA6';
      ctx.beginPath(); ctx.roundRect(-legW/2, 0, legW, legLen, 4); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.ellipse(0, legLen + 4, 8, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      
      ctx.fillStyle = '#E8523A';
      ctx.beginPath(); ctx.roundRect(-16, bodyY - 46, 32, 40, 8); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.roundRect(-16, bodyY - 36, 32, 8, 0); ctx.fill();
      ctx.globalAlpha = 1;

      
      const armLen = 26, armW = 9;
      ctx.save();
      ctx.translate(-17, bodyY - 38);
      ctx.rotate(lArmAngle - 0.1);
      ctx.fillStyle = '#E8523A';
      ctx.beginPath(); ctx.roundRect(-armW/2, 0, armW, armLen, 4); ctx.fill();
      ctx.fillStyle = '#F9C98A';
      ctx.beginPath(); ctx.arc(0, armLen + 5, 6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(17, bodyY - 38);
      ctx.rotate(rArmAngle + 0.1);
      ctx.fillStyle = '#E8523A';
      ctx.beginPath(); ctx.roundRect(-armW/2, 0, armW, armLen, 4); ctx.fill();
      ctx.fillStyle = '#F9C98A';
      ctx.beginPath(); ctx.arc(0, armLen + 5, 6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      
      ctx.fillStyle = '#F9C98A';
      ctx.beginPath(); ctx.roundRect(-5, bodyY - 52, 10, 10, 3); ctx.fill();

      
      const headY = bodyY - 52 - 24 - headBob;
      ctx.fillStyle = '#F9C98A';
      ctx.beginPath(); ctx.arc(0, headY, 22, 0, Math.PI * 2); ctx.fill();


      ctx.fillStyle = '#3D2314';
      ctx.beginPath(); ctx.arc(0, headY, 22, Math.PI, 2 * Math.PI); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, headY - 18, 22, 10, 0, 0, Math.PI * 2); ctx.fill();


      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-8, headY - 2, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(8, headY - 2, 6, 0, Math.PI * 2); ctx.fill();

      const blinking = (t % 120 < 4);
      ctx.fillStyle = '#222';
      if (blinking) {
        ctx.fillRect(-11, headY - 2, 6, 1.5);
        ctx.fillRect(5, headY - 2, 6, 1.5);
      } else {
        ctx.beginPath(); ctx.arc(-7, headY - 2, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(9, headY - 2, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-6, headY - 3.5, 1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, headY - 3.5, 1, 0, Math.PI * 2); ctx.fill();
      }


      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      if (state === 'jump') {
        ctx.fillStyle = '#8B4513';
        ctx.beginPath(); ctx.ellipse(0, headY + 8, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(-4, headY + 6, 8, 3);
      } else if (state === 'wave') {
        ctx.beginPath(); ctx.arc(0, headY + 2, 10, 0.2, Math.PI - 0.2); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(0, headY + 2, 8, 0.3, Math.PI - 0.3); ctx.stroke();
      }

     
      ctx.fillStyle = '#F9C98A';
      ctx.beginPath(); ctx.arc(-22, headY, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(22, headY, 5, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
      ctx.restore();
    }

    function loop() {
      t++;

      if (state === 'jump' || isJumping) {
        charY += jumpVY;
        jumpVY += 0.7;
        if (charY >= GROUND) {
          charY = GROUND;
          isJumping = false;
          jumpVY = 0;
          if (state === 'jump') {
            state = 'idle';
            document.getElementById('state-label').textContent = 'State: idle';
          }
        }
      }

      if (state === 'walk') {
        charX += 2;
        if (charX > W + 40) charX = -40;
      }

      drawGround();
      drawCharacter(charX, charY);
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
